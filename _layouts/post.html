---
layout: default
---
<article class="post">
    <header class="post-header">
        <a href="/" class="back-link">← Back to home</a>
        <h1>{{ page.title }}</h1>
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <footer class="post-bio">
        <div class="post-bio-divider">✿ ❀ ⋆ ✾ ⋆ ❀ ✿</div>
        <img src="/assets/joah.jpg" alt="Joah Gerstenberg" class="post-bio-pic">
        <p>Written by <strong>Joah Gerstenberg</strong>.<br>Want to get in touch? Email me at joahg dot com</p>
    </footer>
</article>
